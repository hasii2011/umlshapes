  email:
    recipients:
      - humberto.a.sanchez.ii@gmail.com
    on_success: change # default: change
    on_failure: always # default: always

language: python

dist: noble

cache: pip

services:
  - xvfb

python:
  - "3.13"

install:
  - echo '***************************************************************'
  - uname -a
  - sudo apt update
  - sudo apt install libnotify-dev
  - sudo apt install libgtk-3-dev
  - sudo apt-get install -y -V libtiff-dev
  - sudo apt-get install -y  libsdl2-dev
  - echo '***************************************************************'
  - GLOBAL=`python --version`
  - echo $GLOBAL
  - PY_VERSION=${GLOBAL#*}
  - pyenv global ${PY_VERSION}
  - pip install --upgrade pip
  - pip install setuptools
  - pip install twine
  - pip install wheel
  - pip install build==1.2.2.post1
  - pip install html-testRunner==1.2.1
  - pip install codeallybasic==1.30.1
  - pip install umlmodel==3.4.0
  - pip install untangle==1.2.1
  - pip install six==1.17.0
  - pip install attrdict3
  - pip install Deprecated==1.3.1
  - travis_wait pip install -vvv wxPython==4.2.5
  - pip install codeallyadvanced==2.5.5
  - pip install Pypubsub==4.0.7
  - pip install human_id==0.2.0

# command to run tests
script:
  - pip install buildlackey
  - unittests -v loud
