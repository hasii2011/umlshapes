
version: '2.1'
orbs:
  python: circleci/python@4.0.0

workflows:
  main:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
jobs:
  build:
    macos:
      xcode: "latest"
    resource_class: m2pro.medium
    steps:
      - checkout:
          method: full
      - restore_cache:
          key: &deps1-cache deps1-{{ .Branch }}-{{ checksum "pyproject.toml" }}
      - run:
          name: Install library dependencies
          command: |
            python3 -m venv venv
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install html-testRunner==1.2.1
            ./venv/bin/pip install codeallybasic==1.30.1
            ./venv/bin/pip install umlmodel==3.4.0
            ./venv/bin/pip install untangle==1.2.1
            ./venv/bin/pip install six==1.16.0
            ./venv/bin/pip install attrdict3
            ./venv/bin/pip install Deprecated==1.3.1
            ./venv/bin/pip install wxPython==4.2.5
            ./venv/bin/pip install codeallyadvanced==2.5.4
            ./venv/bin/pip install human_id==0.2.0
            ./venv/bin/pip install Pypubsub==4.0.7
      - save_cache:
          key: *deps1-cache
          paths:
            - "venv"
      - run:
          name: run tests
          command: | 
            ./venv/bin/pip install buildlackey
            ./venv/bin/unittests
